<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Study Mode - Sclera</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif+Display:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/onboarding.css') }}">
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ffffff",
                        "background-light": "#f6f6f8",
                        "background-dark": "#0a0c10",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "serif": ["Noto Serif Display", "serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
        }
        .serif-text {
            font-family: 'Noto Serif Display', serif;
        }
        .glass-panel {
            background: var(--bg-secondary);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
        }
        .floating-notch {
            background: var(--bg-elevated);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border);
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* Study mode specific classes using root variables */
        .study-container {
            background-color: var(--bg-primary);
            color: var(--text-primary);
        }
        .study-text {
            color: var(--text-primary);
        }
        .study-text-secondary {
            color: var(--text-secondary);
        }
        .study-text-muted {
            color: var(--text-muted);
        }
        .study-border {
            border-color: var(--border);
        }
        .study-border-t {
            border-top-color: var(--border);
        }
        .study-border-subtle {
            border-color: var(--border-subtle);
        }
        .study-bg-secondary {
            background-color: var(--bg-secondary);
        }
        .study-bg-tertiary {
            background-color: var(--bg-tertiary);
        }
        .study-bg-hover {
            background-color: var(--bg-hover);
        }
        .study-bg-secondary-40 {
            background-color: var(--bg-secondary);
            opacity: 0.4;
        }
        .study-accent {
            background-color: var(--accent);
            color: var(--bg-primary);
        }
        .study-accent-hover {
            background-color: var(--accent-hover);
            color: var(--bg-primary);
        }
        .study-success {
            color: var(--success);
        }
        .study-warning {
            color: var(--warning);
        }
        .study-error {
            color: var(--error);
        }
        .study-success-bg {
            background-color: var(--success-bg);
        }
        .study-warning-bg {
            background-color: var(--warning-bg);
        }
        .study-error-bg {
            background-color: var(--error-bg);
        }

        /* Large timer styles */
        .timer-large {
            font-size: clamp(3.125rem, calc(25vw * 0.25 + 2rem), 6.25rem);
            font-weight: 700;
            line-height: 1;
            text-align: center;
            width: 100%;
        }

        .donut-large {
            width: min(clamp(200px, 40vw, 400px), clamp(200px, 60vh, 400px));
            height: min(clamp(200px, 40vw, 400px), clamp(200px, 60vh, 400px));
            flex-shrink: 0;
        }

        .timer-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .donut-center-time {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: 700;
            text-align: center;
            width: 100%;
            pointer-events: none;
        }

        /* Button layout fixes */
        .timer-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            justify-content: center;
            align-items: center;
            max-width: 500px;
            margin: 0 auto;
        }

        .timer-controls button {
            flex-shrink: 0;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .timer-controls {
                gap: 0.5rem;
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .timer-controls button {
                min-width: 100px;
                flex: 1 1 auto;
            }
        }

        /* Fullscreen styles */
        .fullscreen-mode {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            background: var(--bg-primary);
        }

        .fullscreen-mode .timer-large {
            font-size: clamp(6rem, 20vw, 12rem);
        }

        .fullscreen-mode .donut-large {
            width: clamp(300px, 60vw, 600px);
            height: clamp(300px, 60vw, 600px);
        }

        /* Fix for form elements in dark mode */
        .study-bg-tertiary input,
        .study-bg-tertiary select,
        .study-bg-tertiary textarea {
            background-color: var(--bg-tertiary) !important;
            color: var(--text-primary) !important;
        }
        
        .study-bg-tertiary input::placeholder,
        .study-bg-tertiary textarea::placeholder {
            color: var(--text-muted) !important;
        }
        
        .study-bg-tertiary select option {
            background-color: var(--bg-tertiary) !important;
            color: var(--text-primary) !important;
        }
    </style>
</head>

<body class="study-container study-text flex flex-col">
    
    <!-- Use existing topnav -->
    {% include '_topnav.html' %}

    <!-- Main Content Area -->
    <main class="flex-1 flex mt-24 mb-8 gap-6 overflow-hidden" id="mainContent">
        
        <!-- Timer Section (2/3 width) -->
        <section class="flex-1 flex flex-col gap-4">
            <div class="glass-panel rounded-xl flex-1 py-16 px-8 mx-4 flex flex-col items-center justify-center relative">
              

                <!-- Large Timer Display -->
                <div class="timer-wrapper relative flex items-center justify-center">
                    <svg class="donut donut-large" viewBox="0 0 36 36">
                        <path class="donut-bg" stroke="var(--border)" stroke-width="3" fill="none"
                              d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <path class="donut-progress" stroke="var(--accent)" stroke-width="3" fill="none"
                              stroke-dasharray="100, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    </svg>
                    <div class="donut-center-time timer-large study-text absolute flex items-center justify-center" id="timeDisplay">25:00</div>
                </div>

                <!-- Timer Controls - Inline -->
                <div class="flex gap-3 justify-center items-center mt-8 flex-nowrap">
                    <button id="startBtn" class="study-accent font-bold text-sm py-3 px-6 rounded-full study-accent-hover transition-all flex items-center gap-2">
                        <span class="material-symbols-outlined text-sm">play_arrow</span>
                        Start
                    </button>
                    <button id="pauseBtn" class="study-border study-text font-bold text-sm py-3 px-6 rounded-full hover:study-bg-hover transition-all flex items-center gap-2">
                        <span class="material-symbols-outlined text-sm">pause</span>
                        Pause
                    </button>
                    <button id="add5Btn" class="study-border study-text font-bold text-sm py-3 px-4 rounded-full hover:study-bg-hover transition-all">
                        +5 min
                    </button>
                    <button id="add15Btn" class="study-border study-text font-bold text-sm py-3 px-4 rounded-full hover:study-bg-hover transition-all">
                        +15 min
                    </button>
                    <button id="resetBtn" class="study-border study-text font-bold text-sm py-3 px-6 rounded-full hover:study-bg-hover transition-all flex items-center gap-2">
                        <span class="material-symbols-outlined text-sm">refresh</span>
                        Reset
                    </button>
                </div>

                <!-- Stop Session Button - Only shown when session is active -->
                <div class="mt-6" id="stopSessionContainer" style="display: none;">
                    <button id="stopSessionBtn" class="study-error-bg study-error font-bold text-sm py-3 px-8 rounded-full hover:opacity-80 transition-all">
                        <span class="material-symbols-outlined text-sm">stop</span>
                        Stop Session
                    </button>
                </div>

                            </div>
        </section>

        <!-- Todo Section (1/3 width) -->
        <aside class="w-96 flex flex-col gap-4">
            <div class="glass-panel rounded-xl p-6 mx-4 flex flex-col gap-6">
                <div class="flex items-center justify-between">
                    <h3 class="text-lg font-bold study-text">Study Tasks</h3>
                    <span class="material-symbols-outlined study-text-secondary text-lg">task_alt</span>
                </div>

                <!-- Add Todo Form -->
                <form id="todoForm" class="flex gap-2">
                    <input type="text" id="todoInput" placeholder="Add a study task…" required
                           class="flex-1 study-bg-tertiary study-border rounded-lg px-4 py-2 text-sm study-text placeholder:study-text-muted focus:outline-none focus:ring-1 focus:ring-accent/50 transition-all">
                    <button type="submit" class="study-accent font-bold text-sm px-4 py-2 rounded-full study-accent-hover transition-all">
                        <span class="material-symbols-outlined text-sm">add</span>
                    </button>
                </form>

                <!-- Todo List -->
                <div class="flex-1 overflow-y-auto hide-scrollbar space-y-2">
                    {% for todo in todos %}
                    <div class="flex items-center gap-3 p-3 study-bg-secondary rounded-lg
                        {% if todo.done %}study-success-bg{% endif %}
                    ">
                        <span class="flex-1 study-text {% if todo.done %}line-through opacity-60{% endif %}">{{ todo.text }}</span>
                        <div class="flex gap-2">
                            <button class="finish-btn study-success-bg study-success rounded-full p-2 hover:opacity-80 transition-all" data-id="{{ todo.id }}" title="Mark as complete">
                                <span class="material-symbols-outlined text-sm">check</span>
                            </button>
                            <button class="delete-btn study-error-bg study-error rounded-full p-2 hover:opacity-80 transition-all" data-id="{{ todo.id }}" title="Delete">
                                <span class="material-symbols-outlined text-sm">close</span>
                            </button>
                        </div>
                    </div>
                    {% endfor %}
                    
                    {% if not todos %}
                    <div class="text-center study-text-muted py-8">
                        <span class="material-symbols-outlined text-4xl mb-2">task_alt</span>
                        <p>No study tasks yet. Add one to get started!</p>
                    </div>
                    {% endif %}
                </div>
            </div>
        </aside>
    </main>

    <script>
        let totalSeconds = 25 * 60;
        let remaining = totalSeconds;
        let interval = null;
        let running = false;
        let sessionActive = false;

        const display = document.getElementById('timeDisplay');
        const progress = document.querySelector('.donut-progress');
        const stopSessionContainer = document.getElementById('stopSessionContainer');

        function format(sec) {
            const m = Math.floor(sec / 60);
            const s = sec % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function render() {
            display.textContent = format(remaining);
            const pct = (remaining / totalSeconds) * 100;
            progress.style.strokeDasharray = `${pct}, 100`;
        }

        function saveTimerState() {
            const state = {
                running: running,
                sessionActive: sessionActive,
                remaining: remaining,
                totalSeconds: totalSeconds,
                timestamp: Date.now()
            };
            sessionStorage.setItem('timerState', JSON.stringify(state));
        }

        function restoreTimerState() {
            try {
                const saved = sessionStorage.getItem('timerState');
                if (saved) {
                    const state = JSON.parse(saved);
                    
                    // Only restore if saved within last 30 minutes (to avoid stale sessions)
                    const now = Date.now();
                    const ageMinutes = (now - state.timestamp) / (1000 * 60);
                    
                    if (ageMinutes < 30) {
                        running = false; // Always start paused after reload
                        sessionActive = state.sessionActive || false;
                        remaining = state.remaining || (25 * 60);
                        totalSeconds = state.totalSeconds || (25 * 60);
                        
                        // Update UI based on restored state
                        render();
                        
                        // Show/hide stop session button based on restored session state
                        if (sessionActive) {
                            stopSessionContainer.style.display = 'block';
                        } else {
                            stopSessionContainer.style.display = 'none';
                        }
                        
                        console.log('Timer state restored from session');
                        return true;
                    } else {
                        // Clear stale session data
                        sessionStorage.removeItem('timerState');
                    }
                }
            } catch (e) {
                console.error('Error restoring timer state:', e);
                sessionStorage.removeItem('timerState');
            }
            return false;
        }

        function startTimer() {
            if (running) return;
            running = true;
            
            // Auto-start session when timer starts
            sessionActive = true;
            // Show stop session button (only when session first starts)
            if (stopSessionContainer.style.display === 'none') {
                stopSessionContainer.style.display = 'block';
            }

            interval = setInterval(() => {
                remaining--;
                render();
                saveTimerState(); // Save state every second

                // Log study time whenever timer is running (session is auto-managed)
                const now = new Date();
                const localHour = now.getHours();
                const localWeekday = (now.getDay() + 6) % 7; // ISO: 0=Mon, 6=Sun

                fetch('/study-mode/time', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        seconds: 1,
                        local_hour: localHour,
                        local_weekday: localWeekday
                    })
                });

                if (remaining <= 0) {
                    clearInterval(interval);
                    running = false;
                    saveTimerState(); // Save final state
                }
            }, 1000);
        }

        document.getElementById('startBtn').onclick = startTimer;

        document.getElementById('pauseBtn').onclick = () => {
            clearInterval(interval);
            running = false;
            
            // Don't end session on pause - just stop time tracking
            // Session continues through breaks to avoid excessive session creation
            saveTimerState(); // Save state after pause
        };

        document.getElementById('resetBtn').onclick = () => {
            clearInterval(interval);
            running = false;
            totalSeconds = 25 * 60;
            remaining = totalSeconds;
            
            render();
            saveTimerState(); // Save state after reset
        };

        // Stop session button - stops and resets timer
        document.getElementById('stopSessionBtn').onclick = () => {
            clearInterval(interval);
            running = false;
            sessionActive = false;
            totalSeconds = 25 * 60;
            remaining = totalSeconds;
            
            // Hide stop session button
            stopSessionContainer.style.display = 'none';
            
            render();
            saveTimerState(); // Save state after stopping session
        };

        
        document.getElementById('add5Btn').onclick = () => {
            totalSeconds += 300;
            remaining += 300;
            render();
            saveTimerState(); // Save state after adding time
        };

        document.getElementById('add15Btn').onclick = () => {
            totalSeconds += 900;
            remaining += 900;
            render();
            saveTimerState(); // Save state after adding time
        };

        // Pop-out Mini Timer functionality
        let miniTimerWindow = null;
        let pageHidden = false;

        // Open mini timer in new window
        function openMiniTimer() {
            if (!sessionActive) return; // Only open if session is active
            
            // Close existing window if open
            if (miniTimerWindow && !miniTimerWindow.closed) {
                miniTimerWindow.close();
            }
            
            // Get current tasks
            const tasks = [];
            document.querySelectorAll('.todo-item').forEach(task => {
                const taskText = task.querySelector('.todo-text')?.textContent || '';
                const isCompleted = task.querySelector('.finish-btn')?.textContent === '✓';
                tasks.push({ text: taskText, completed: isCompleted });
            });
            
            // Open new window with mini timer
            const width = 320;
            const height = 500;
            const left = screen.width - width - 20;
            const top = 20;
            
            miniTimerWindow = window.open(
                '',
                'studyMiniTimer',
                `width=${width},height=${height},left=${left},top=${top},resizable=no,scrollbars=no,status=no,toolbar=no,menubar=no`
            );
            
            if (miniTimerWindow) {
                // Get current theme and styles from parent window
                const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
                const computedStyles = getComputedStyle(document.documentElement);
                
                // Extract all CSS variables from parent window
                const cssVariables = {};
                for (let i = 0; i < computedStyles.length; i++) {
                    const property = computedStyles[i];
                    if (property.startsWith('--')) {
                        cssVariables[property] = computedStyles.getPropertyValue(property).trim();
                    }
                }

                // Write mini timer HTML with inherited theme
                miniTimerWindow.document.write(`
                    <!DOCTYPE html>
                    <html class="${currentTheme}" lang="en">
                    <head>
                        <meta charset="utf-8"/>
                        <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
                        <title>Study Timer - Sclera</title>
                        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
                        <style>
                            * { margin: 0; padding: 0; box-sizing: border-box; }
                            :root {
                                ${Object.entries(cssVariables).map(([key, value]) => `${key}: ${value};`).join('\n                                ')}
                            }
                            body {
                                background: var(--bg-secondary);
                                color: var(--text-primary);
                                font-family: 'Inter', sans-serif;
                                width: 320px;
                                height: 500px;
                                overflow: hidden;
                            }
                            .header {
                                padding: 12px 16px;
                                border-bottom: 1px solid var(--border);
                                display: flex;
                                justify-content: space-between;
                                align-items: center;
                            }
                            .title {
                                font-size: 0.875rem;
                                font-weight: 600;
                                color: var(--text-primary);
                            }
                            .close-btn {
                                background: none;
                                border: none;
                                color: var(--text-secondary);
                                cursor: pointer;
                                padding: 4px;
                                border-radius: 4px;
                                transition: all var(--transition-fast, 150ms) ease;
                            }
                            .close-btn:hover {
                                background: var(--bg-tertiary);
                                color: var(--text-primary);
                            }
                            .content {
                                padding: 16px;
                            }
                            .timer-display {
                                display: flex;
                                align-items: center;
                                justify-content: center;
                                gap: 16px;
                                margin-bottom: 16px;
                            }
                            .time-display {
                                font-size: 2rem;
                                font-weight: 700;
                                font-variant-numeric: tabular-nums;
                                color: var(--text-primary);
                            }
                            .progress-ring {
                                width: 60px;
                                height: 60px;
                            }
                            .progress-svg {
                                transform: rotate(-90deg);
                            }
                            .progress-bg {
                                fill: none;
                                stroke: var(--progress-track, var(--border));
                                stroke-width: 3;
                            }
                            .progress-fill {
                                fill: none;
                                stroke: var(--progress-fill, var(--accent));
                                stroke-width: 3;
                                stroke-linecap: round;
                                transition: stroke-dasharray var(--transition, 200ms) ease;
                            }
                            .controls {
                                display: flex;
                                justify-content: center;
                                gap: 8px;
                                margin-bottom: 16px;
                            }
                            .control-btn {
                                width: 40px;
                                height: 40px;
                                border-radius: 50%;
                                border: 1px solid var(--border);
                                background: var(--bg-tertiary);
                                color: var(--text-primary);
                                cursor: pointer;
                                display: flex;
                                align-items: center;
                                justify-content: center;
                                transition: all var(--transition-fast, 150ms) ease;
                            }
                            .control-btn:hover {
                                background: var(--bg-hover);
                                border-color: var(--accent);
                            }
                            .control-btn.start:hover {
                                background: var(--accent);
                                color: var(--btn-text, var(--text-inverse));
                            }
                            .control-btn.pause:hover {
                                background: var(--warning);
                                color: var(--btn-text, var(--text-inverse));
                            }
                            .control-btn.reset:hover {
                                background: var(--text-secondary);
                                color: var(--btn-text, var(--text-inverse));
                            }
                            .control-btn.stop:hover {
                                background: var(--error);
                                color: var(--btn-text, var(--text-inverse));
                            }
                            .tasks-section {
                                border-top: 1px solid var(--border);
                                padding-top: 12px;
                            }
                            .tasks-header {
                                display: flex;
                                justify-content: space-between;
                                align-items: center;
                                margin-bottom: 8px;
                            }
                            .tasks-title {
                                font-size: 0.75rem;
                                font-weight: 600;
                                color: var(--text-secondary);
                            }
                            .tasks-count {
                                font-size: 0.75rem;
                                font-weight: 600;
                                color: var(--accent);
                            }
                            .tasks-list {
                                max-height: 120px;
                                overflow-y: auto;
                            }
                            .task-item {
                                display: flex;
                                align-items: center;
                                gap: 8px;
                                padding: 6px 0;
                                font-size: 0.875rem;
                                color: var(--text-primary);
                            }
                            .task-checkbox {
                                width: 16px;
                                height: 16px;
                                border: 1px solid var(--border);
                                border-radius: 3px;
                                flex-shrink: 0;
                            }
                            .task-checkbox.checked {
                                background: var(--accent);
                                border-color: var(--accent);
                            }
                            .task-text {
                                flex: 1;
                                overflow: hidden;
                                text-overflow: ellipsis;
                                white-space: nowrap;
                            }
                            .task-text.completed {
                                text-decoration: line-through;
                                opacity: 0.6;
                            }
                            .footer {
                                padding: 12px 16px;
                                border-top: 1px solid var(--border);
                            }
                            .return-btn {
                                width: 100%;
                                padding: 8px 16px;
                                border: 1px solid var(--accent);
                                background: transparent;
                                color: var(--accent);
                                border-radius: 8px;
                                font-size: 0.875rem;
                                font-weight: 600;
                                cursor: pointer;
                                display: flex;
                                align-items: center;
                                justify-content: center;
                                gap: 8px;
                                transition: all var(--transition-fast, 150ms) ease;
                            }
                            .return-btn:hover {
                                background: var(--accent);
                                color: var(--btn-text, var(--text-inverse));
                            }
                        </style>
                    </head>
                    <body>
                        <div class="header">
                            <span class="title">Study Session Active</span>
                            <button class="close-btn" onclick="window.close()">
                                <span class="material-symbols-outlined">close</span>
                            </button>
                        </div>
                        <div class="content">
                            <div class="timer-display">
                                <div class="time-display" id="timeDisplay">${format(remaining)}</div>
                                <div class="progress-ring">
                                    <svg class="progress-svg" viewBox="0 0 36 36">
                                        <path class="progress-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                                        <path class="progress-fill" id="progress" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                                    </svg>
                                </div>
                            </div>
                            <div class="controls">
                                <button class="control-btn start" onclick="window.opener.startTimer()">
                                    <span class="material-symbols-outlined">play_arrow</span>
                                </button>
                                <button class="control-btn pause" onclick="window.opener.pauseTimer()">
                                    <span class="material-symbols-outlined">pause</span>
                                </button>
                                <button class="control-btn reset" onclick="window.opener.resetTimer()">
                                    <span class="material-symbols-outlined">refresh</span>
                                </button>
                                <button class="control-btn stop" onclick="window.opener.stopSession()">
                                    <span class="material-symbols-outlined">stop</span>
                                </button>
                            </div>
                            <div class="tasks-section">
                                <div class="tasks-header">
                                    <span class="tasks-title">Tasks</span>
                                    <span class="tasks-count">${tasks.length}</span>
                                </div>
                                <div class="tasks-list">
                                    ${tasks.map(task => `
                                        <div class="task-item">
                                            <div class="task-checkbox ${task.completed ? 'checked' : ''}"></div>
                                            <div class="task-text ${task.completed ? 'completed' : ''}">${task.text}</div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                        <div class="footer">
                            <button class="return-btn" onclick="window.opener.focus()">
                                <span class="material-symbols-outlined">arrow_back</span>
                                Return to Study Mode
                            </button>
                        </div>
                    </body>
                    </html>
                `);
                
                miniTimerWindow.document.close();
                
                // Start updating the mini timer
                updateMiniTimerWindow();
            }
        }

        // Update mini timer window
        function updateMiniTimerWindow() {
            if (!miniTimerWindow || miniTimerWindow.closed) return;
            
            try {
                const timeDisplay = miniTimerWindow.document.getElementById('timeDisplay');
                const progress = miniTimerWindow.document.getElementById('progress');
                
                if (timeDisplay) {
                    timeDisplay.textContent = format(remaining);
                }
                
                if (progress) {
                    const pct = (remaining / totalSeconds) * 100;
                    const circumference = 2 * Math.PI * 15.9155;
                    const offset = circumference - (pct / 100) * circumference;
                    progress.style.strokeDasharray = `${circumference} ${circumference}`;
                    progress.style.strokeDashoffset = offset;
                }
                
                // Schedule next update
                if (running) {
                    setTimeout(() => updateMiniTimerWindow(), 1000);
                }
            } catch (e) {
                // Window was closed
                miniTimerWindow = null;
            }
        }

        // Close mini timer window
        function closeMiniTimer() {
            if (miniTimerWindow && !miniTimerWindow.closed) {
                miniTimerWindow.close();
            }
            miniTimerWindow = null;
        }

        // Page visibility API - open mini timer when page hidden
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                pageHidden = true;
                openMiniTimer();
            } else {
                pageHidden = false;
                closeMiniTimer();
            }
        });

        // Window focus/blur events
        window.addEventListener('blur', () => {
            if (!pageHidden && sessionActive) {
                openMiniTimer();
            }
        });

        window.addEventListener('focus', () => {
            if (!pageHidden) {
                closeMiniTimer();
            }
        });

        // Beforeunload - close mini timer when navigating away completely
        window.addEventListener('beforeunload', () => {
            closeMiniTimer();
        });

        // Update mini timer when main timer changes
        const originalRender = render;
        render = function() {
            originalRender();
            if (miniTimerWindow && !miniTimerWindow.closed) {
                updateMiniTimerWindow();
            }
        };

        // Global functions for mini timer window controls
        window.startTimer = startTimer;
        window.pauseTimer = () => document.getElementById('pauseBtn').click();
        window.resetTimer = () => document.getElementById('resetBtn').click();
        window.stopSession = () => document.getElementById('stopSessionBtn').click();

        // Initialize timer - restore state if available
        if (!restoreTimerState()) {
            render(); // Initial render if no saved state
        }

        // Handle window resize for responsive timer
        window.addEventListener('resize', () => {
            // Force re-render on resize to update clamp() values
            render();
        });

        /* TODO ACTIONS */
        document.querySelectorAll('.finish-btn').forEach(btn => {
            btn.onclick = () => fetch(`/study-mode/todo/${btn.dataset.id}/toggle`, { method: 'POST' })
                .then(() => location.reload());
        });

        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.onclick = () => fetch(`/study-mode/todo/${btn.dataset.id}/delete`, { method: 'POST' })
                .then(() => location.reload());
        });

        document.getElementById('todoForm').onsubmit = e => {
            e.preventDefault();
            fetch('/study-mode/todo/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: todoInput.value })
            }).then(() => location.reload());
        };

        /* NOTIFICATION ACTIONS */
        document.querySelectorAll('.notification-dismiss').forEach(btn => {
            btn.onclick = () => {
                const notifId = btn.dataset.id;
                fetch(`/notifications/${notifId}/dismiss`, { method: 'POST' })
                    .then(() => {
                        btn.closest('.notification-item').style.opacity = '0.5';
                        btn.disabled = true;
                        btn.textContent = '✓';
                    });
            };
        });
        </script>
